name: update-morphology

on:
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      MORPHOLOGY_DEPLOY_KEY: ${{ secrets.MORPHOLOGY_DEPLOY_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure read-only morphology access
        run: |
          test -n "$MORPHOLOGY_DEPLOY_KEY"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$MORPHOLOGY_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts
      - name: Fetch newest morphology version
        run: |
          remote=git@github.com:kupilikula/tamil-morphology.git
          tag=$(git ls-remote --tags "$remote" 'refs/tags/v*' | sed 's#.*refs/tags/##; /^.*\^{}$/d' | sort -V | tail -1)
          test -n "$tag"
          git clone --depth 1 --branch "$tag" "$remote" /tmp/tamil-morphology
          tar -czf /tmp/tamil-morphology-release.tar.gz \
            -C /tmp tamil-morphology/manifest.json tamil-morphology/runtime
      - name: Verify and install runtime
        run: |
          python scripts/install_morphology_release.py /tmp/tamil-morphology-release.tar.gz \
            --runtime-dir build/fst-models \
            --runtime-dir static-word-list/fst-models \
            --runtime-dir server/fst-models \
            --lock-file morphology.lock.json
      - name: Verify consumer copies and run FST regressions
        run: |
          sudo apt-get update
          sudo apt-get install -y foma
          diff -qr /tmp/tamil-morphology/runtime build/fst-models
          diff -qr /tmp/tamil-morphology/runtime static-word-list/fst-models
          diff -qr /tmp/tamil-morphology/runtime server/fst-models
          python3 /tmp/tamil-morphology/fst/tests/run_fst_regressions.py
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-tamil-morphology
          delete-branch: true
          commit-message: Update Tamil morphology release
          title: Update Tamil morphology release
          body: |
            Automated checksum-verified update from `kupilikula/tamil-morphology`.
            Solladukku's FST regression suite passed.
